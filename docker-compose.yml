services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/certs:/etc/nginx/certs:ro
    depends_on:
      - web
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - REDIS_URL=redis://redis:6379
      - PDF_RENDER_SECRET=${PDF_RENDER_SECRET}
      - WEB_INTERNAL_URL=http://web:3000
      - CRON_SECRET=${CRON_SECRET}
    expose:
      - "3000"
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - REDIS_URL=redis://redis:6379
      - GOTENBERG_URL=http://gotenberg:3000
      # URL interna que o Gotenberg usa p/ buscar as páginas /imprimir do web
      - WEB_INTERNAL_URL=http://web:3000
      # Auto-encerramento: mesmo segredo do web (o worker chama /api/cron/encerrar-expirados a cada 60s)
      - CRON_SECRET=${CRON_SECRET}
      # Base pública dos PDFs no storage (Supabase). Ex.: https://<proj>.supabase.co/storage/v1/object/public/pdfs
      - PDF_PUBLIC_BASE=${PDF_PUBLIC_BASE}
    depends_on:
      - redis
      - gotenberg
    restart: unless-stopped

  # Gotenberg: conversão de HTML/URL → PDF fora do app (não trava o web).
  gotenberg:
    image: gotenberg/gotenberg:8
    command:
      - gotenberg
      - --chromium-allow-list=.*
      - --api-timeout=120s
    expose:
      - "3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:

networks:
  default:
    driver: bridge
