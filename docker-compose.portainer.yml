# =====================================================================
# STACK PORTAINER (Swarm) — App + PDF assíncrono (worker + Gotenberg)
# Usa IMAGENS PRONTAS do GHCR (buildadas pelo GitHub Actions). Swarm não builda.
#
# ANTES DE SUBIR:
#  1) O workflow .github/workflows/docker-publish.yml precisa ter rodado com sucesso
#     (publica as imagens web e worker no ghcr.io). Deixe os 2 pacotes PÚBLICOS
#     (GitHub → Packages → cada pacote → Package settings → Change visibility → Public),
#     senão o Swarm não consegue baixar.
#  2) Rode a migration supabase/migrations/20260701000001_pdf_worker_gotenberg.sql
#     no SQL Editor do Supabase (bucket `pdfs` + tabela simulado_pdf_jobs).
#  3) Preencha as 4 variáveis em "Environment variables" no Portainer (ver README/guia).
#
# Coloque seu proxy/HTTPS (Cloudflare, Nginx Proxy Manager, Traefik…) na frente do `web`.
# =====================================================================

services:
  # App Next.js — UI, enfileira PDFs e serve as páginas /imprimir
  web:
    image: ghcr.io/revisaoprojetos/plataforma_simulado:latest
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - REDIS_URL=redis://redis:6379
      - PDF_RENDER_SECRET=${PDF_RENDER_SECRET}
      - WEB_INTERNAL_URL=http://web:3000
    ports:
      - "3000:3000"
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  # Consome a fila, chama o Gotenberg, sobe o PDF no bucket `pdfs`
  worker:
    image: ghcr.io/revisaoprojetos/plataforma_simulado-worker:latest
    environment:
      - NODE_ENV=production
      - SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - REDIS_URL=redis://redis:6379
      - GOTENBERG_URL=http://gotenberg:3000
      - WEB_INTERNAL_URL=http://web:3000
      # PDF_PUBLIC_BASE é opcional: sem ela, o worker usa o getPublicUrl do Supabase.
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  # Motor de PDF (Chromium embutido) — renderiza /imprimir fora do app
  gotenberg:
    image: gotenberg/gotenberg:8
    command:
      - gotenberg
      - --chromium-allow-list=.*
      - --api-timeout=120s
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  # Fila (compartilhada web=produtor / worker=consumidor)
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    deploy:
      replicas: 1
      restart_policy:
        condition: any

volumes:
  redis_data:
