name: Build e Push para GHCR

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  # Pacote deste repositório (o token só tem permissão de escrita no pacote do próprio repo).
  IMAGE_NAME: plataforma_simulado

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalizar owner para minúsculas (GHCR exige)
        run: echo "IMAGE_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e push (app Next.js — apps/web)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_APP_URL=https://simulado.revisaopge.com.br
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build e push (worker BullMQ — apps/worker)
        uses: docker/build-push-action@v6
        with:
          context: ./apps/worker
          file: ./apps/worker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_NAME }}-worker:latest
            ghcr.io/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_NAME }}-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build e push (API NestJS — apps/api)
        # A API é Fase 3 (skeleton, ainda NÃO deployada). Se o build dela falhar, NÃO pode
        # bloquear as imagens web/worker (que são o que roda em produção). Sobe quando der.
        continue-on-error: true
        uses: docker/build-push-action@v6
        with:
          # context = raiz do monorepo (o Dockerfile copia packages/data + apps/api).
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_NAME }}-api:latest
            ghcr.io/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_NAME }}-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      # Pula o deploy inteiro se o VPS não estiver configurado (evita falhar o workflow).
      - name: Verificar configuração do VPS
        id: vps
        run: |
          if [ -z "${{ secrets.VPS_HOST }}" ]; then
            echo "VPS não configurado (secret VPS_HOST ausente) — pulando deploy."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configurar SSH
        if: steps.vps.outputs.skip != 'true'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Atualizar serviço no VPS
        if: steps.vps.outputs.skip != 'true'
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "docker service update \
              --force \
              --image ghcr.io/revisaoprojetos/plataforma_simulado:latest \
              --env-add 'SUPABASE_URL=${{ secrets.SUPABASE_URL }}' \
              --env-add 'SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}' \
              --env-add 'SUPABASE_PUBLISHABLE_KEY=${{ secrets.SUPABASE_PUBLISHABLE_KEY }}' \
              ${{ secrets.VPS_SERVICE || 'plataforma_simulado_app' }}"
